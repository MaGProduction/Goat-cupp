<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT CUP Champion</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
html,body{min-height:100%;}
body{overflow-x:hidden;overflow-y:auto;background:radial-gradient(circle at top,#1d5fff,#020814 60%,#000);color:#fff;text-align:center}
body:before{content:"";position:fixed;inset:-50%;background:radial-gradient(circle,#ffffff33 2px,transparent 2px);background-size:80px 80px;animation:bg 40s linear infinite;opacity:.25;pointer-events:none}
@keyframes bg{to{transform:translate(-250px,-250px)}}
.hero{position:relative;padding:50px 20px}
h1{font-size:58px;color:#ffd700;text-shadow:0 0 20px gold,0 0 50px orange}
.trophy{font-size:90px;animation:float 2.8s ease-in-out infinite}
.ball{font-size:70px;animation:spin 8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{50%{transform:translateY(-12px)}}
.card{position:relative;max-width:900px;margin:20px auto 120px;padding:40px;border-radius:25px;background:#ffffff12;backdrop-filter:blur(12px);border:1px solid #ffffff22;box-shadow:0 0 40px #1aa7ff66}
.concluded{font-size:34px;color:#ffd700}.subtitle{margin-top:28px;font-size:36px;font-weight:bold}
.winner{margin-top:18px;font-size:96px;font-weight:900}
.status{margin-top:30px;color:#8fd3ff;font-size:22px;font-weight:bold}
.badge{display:inline-block;margin-top:30px;background:#c1121f;padding:14px 24px;border-radius:999px;font-weight:bold}
.confetti{position:fixed;top:-20px;width:8px;height:16px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
footer{position:relative;margin:40px 0 20px;color:#aaa}
.spacer{height:500px;}
</style>
</head>
<body>
<div class="hero"><div class="trophy">🏆</div><h1>GOAT CUP EFOOTBALL</h1><div class="ball">⚽</div></div>
<div class="card">
<div class="concluded">🏆 GOAT CUP IS CONCLUDED 🏆</div>
<div class="subtitle">The Winner of GOAT CUP</div>
<div class="winner">LEWI</div>
<div class="status">Winner still under check by FIFA Official</div>
<div class="badge">🚧 This Website under development by Melvin 🚧</div>
</div>
<div class="spacer"></div>
<footer id="f"></footer>
<script>
setInterval(()=>f.textContent="© 2026 GOAT CUP • "+new Date().toLocaleTimeString(),1000);
for(let i=0;i<120;i++){
let d=document.createElement("div");
d.className="confetti";
d.style.left=Math.random()*100+"vw";
d.style.background=["gold","#fff","#4fc3ff","#ff9800"][Math.floor(Math.random()*4)];
d.style.animationDuration=(3+Math.random()*4)+"s";
d.style.animationDelay=(Math.random()*2)+"s";
document.body.appendChild(d);}
</script>
</body></html>
